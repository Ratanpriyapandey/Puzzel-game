<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e0703c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Puzzle Pop">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Puzzle Pop</title>
<style>
  :root {
    --accent: #e0703c; --accent-2: #f2a24c; --good: #3fae84;
    --page: #efe0d3; --app: #fffaf4; --app-2: #fff3e9; --board: #f6e7d8;
    --ink: #2c1d13; --ink-2: #7c6353; --line: #efdccb;
    --sh-1: 0 1px 2px rgba(60,30,10,.06), 0 4px 14px -6px rgba(60,30,10,.14);
    --sh-2: 0 30px 70px -30px rgba(80,40,15,.55);
    --font: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, "Helvetica Neue", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --page:#140d09; --app:#211710; --app-2:#2a1d14; --board:#1a120c; --ink:#f6ebe0; --ink-2:#bda593; --line:#ffffff12;
      --sh-1:0 1px 2px rgba(0,0,0,.4),0 6px 16px -6px rgba(0,0,0,.5); --sh-2:0 30px 70px -28px rgba(0,0,0,.8); }
  }
  :root[data-theme="light"]{--page:#efe0d3;--app:#fffaf4;--app-2:#fff3e9;--board:#f6e7d8;--ink:#2c1d13;--ink-2:#7c6353;--line:#efdccb;--sh-1:0 1px 2px rgba(60,30,10,.06),0 4px 14px -6px rgba(60,30,10,.14);--sh-2:0 30px 70px -30px rgba(80,40,15,.55);}
  :root[data-theme="dark"]{--page:#140d09;--app:#211710;--app-2:#2a1d14;--board:#1a120c;--ink:#f6ebe0;--ink-2:#bda593;--line:#ffffff12;--sh-1:0 1px 2px rgba(0,0,0,.4),0 6px 16px -6px rgba(0,0,0,.5);--sh-2:0 30px 70px -28px rgba(0,0,0,.8);}

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body { font-family: var(--font); color: var(--ink);
    background: radial-gradient(120% 80% at 50% -10%, color-mix(in srgb,var(--accent-2) 22%,var(--page)), var(--page));
    display: flex; align-items: center; justify-content: center; -webkit-user-select: none; user-select: none; }
  .app { position: relative; width: 100%; max-width: 430px; height: 100vh; max-height: 940px;
    background: var(--app); display: flex; flex-direction: column; overflow: hidden; }
  @media (min-width: 470px) { .app { height: min(94vh, 920px); border-radius: 34px; box-shadow: var(--sh-2); } }

  .appbar { display: flex; align-items: center; justify-content: space-between; padding: max(16px, env(safe-area-inset-top)) 20px 10px; }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 18px; letter-spacing: -.01em; }
  .brand .logo { width: 30px; height: 30px; border-radius: 9px; display: grid; place-content: center; font-size: 16px;
    background: linear-gradient(150deg, var(--accent-2), var(--accent)); box-shadow: var(--sh-1); }
  .pill { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--ink-2);
    background: var(--app-2); border: 1px solid var(--line); padding: 6px 12px; border-radius: 99px; transition: color .3s, background .3s; }
  .pill.complete { color: #fff; background: var(--good); border-color: transparent; }

  .modes { display: flex; gap: 4px; margin: 4px 20px 0; background: var(--app-2); border: 1px solid var(--line); border-radius: 14px; padding: 4px; }
  .seg { flex: 1; border: none; background: transparent; font-family: var(--font); font-weight: 800; font-size: 12.5px; color: var(--ink-2);
    padding: 9px 4px; border-radius: 10px; cursor: pointer; transition: background .2s, color .2s; }
  .seg.on { background: var(--app); color: var(--accent); box-shadow: var(--sh-1); }
  .seg:focus-visible { outline: 2.5px solid var(--accent); outline-offset: 2px; }

  .stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 12px; padding: 12px 20px 8px; min-height: 0; }
  .frame { position: relative; width: min(100%, 54vh); margin: 0 auto; aspect-ratio: 1/1; border-radius: 24px; overflow: hidden;
    background: var(--board); box-shadow: var(--sh-1), inset 0 0 0 1px var(--line); touch-action: none; }
  .ghost { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity .35s ease; z-index: 0; }
  .ghost.show { opacity: .22; }
  .frame.done .ghost { opacity: 0; }
  .slots { position: absolute; inset: 0; display: grid; pointer-events: none; z-index: 1; }
  .slot { border-radius: 12px; border: 1.5px dashed color-mix(in srgb, var(--accent) 30%, transparent); opacity: .4; }
  .board { position: absolute; inset: 0; z-index: 2; }
  .piece { position: absolute; top: 0; left: 0; background-repeat: no-repeat; border-radius: 12px;
    box-shadow: 0 6px 16px -6px rgba(50,25,5,.5); cursor: grab; touch-action: none; filter: saturate(.82) brightness(.99); will-change: transform;
    transition: transform .24s cubic-bezier(.34,1.5,.5,1), box-shadow .15s ease, filter .5s ease, border-radius .4s ease; }
  .piece.dragging { cursor: grabbing; box-shadow: 0 22px 38px -10px rgba(50,25,5,.6); z-index: 50; transition: box-shadow .12s ease; }
  .piece.correct { box-shadow: 0 0 0 2.5px var(--good), 0 5px 12px -6px rgba(50,25,5,.4); }
  .frame.done .piece { filter: saturate(1.1) brightness(1.03); border-radius: 5px; box-shadow: 0 2px 7px -4px rgba(50,25,5,.4); }
  .frame.done .slot { opacity: 0; transition: opacity .4s; }
  .frame.done .board { animation: pop .55s cubic-bezier(.34,1.56,.5,1); }
  @keyframes pop { 0%{transform:scale(1)} 45%{transform:scale(1.035)} 100%{transform:scale(1)} }

  .refthumb { position: absolute; top: 12px; right: 12px; width: 27%; aspect-ratio: 1; border-radius: 12px;
    background-size: cover; background-position: center; z-index: 8; box-shadow: 0 8px 20px -8px rgba(0,0,0,.6), 0 0 0 3px var(--app); transition: opacity .3s, transform .3s; }
  .refthumb.hidden { opacity: 0; transform: scale(.85); pointer-events: none; }
  .frame.done .refthumb { opacity: 0; }

  .slot.hinting { opacity: 1 !important; border-color: var(--accent-2); animation: slotPulse 1.5s ease; }
  .piece.hinting { z-index: 40; animation: piecePulse 1.5s ease; }
  @keyframes slotPulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 0 5px color-mix(in srgb,var(--accent-2) 60%,transparent)} }
  @keyframes piecePulse { 0%,100%{filter:saturate(.82) brightness(.99)} 50%{filter:saturate(1.3) brightness(1.16)} }

  .status { margin: 0; text-align: center; color: var(--ink-2); font-size: 14px; font-weight: 600; min-height: 20px; }
  .preview { display: flex; align-items: center; justify-content: center; }
  .thumb { width: 92px; height: 92px; border-radius: 14px; background-size: cover; background-position: center;
    box-shadow: var(--sh-1), 0 0 0 3px var(--app); }

  .toolbar { display: flex; gap: 8px; padding: 8px 16px max(18px, env(safe-area-inset-bottom)); }
  .tool { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: var(--font); font-size: 11.5px; font-weight: 700;
    color: var(--ink-2); background: var(--app-2); border: 1px solid var(--line); border-radius: 16px; padding: 10px 4px; cursor: pointer;
    transition: transform .12s ease, background .2s ease, color .2s ease; }
  .tool .ic { font-size: 19px; line-height: 1; }
  .tool:active { transform: translateY(1px) scale(.98); }
  .tool:focus-visible { outline: 2.5px solid var(--accent); outline-offset: 2px; }
  .tool[aria-pressed="true"] { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--app-2)); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
  .tool.primary { position: relative; color: #fff; background: linear-gradient(150deg, var(--accent-2), var(--accent)); border-color: transparent; box-shadow: 0 10px 20px -10px var(--accent); }
  .tool.primary input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .sheet { position: absolute; left: 0; right: 0; bottom: 0; z-index: 30; background: var(--app); border-radius: 28px 28px 0 0;
    padding: 10px 22px max(24px, env(safe-area-inset-bottom)); box-shadow: 0 -20px 50px -20px rgba(50,25,5,.4);
    transform: translateY(115%); transition: transform .55s cubic-bezier(.22,1,.36,1); text-align: center; }
  .app.solved .sheet { transform: translateY(0); }
  .grab { width: 40px; height: 5px; border-radius: 99px; background: var(--line); margin: 2px auto 14px; }
  .sheet h2 { margin: 0 0 4px; font-size: 22px; font-weight: 800; letter-spacing: -.01em; }
  .sheet p { margin: 0 0 16px; color: var(--ink-2); font-size: 14px; }
  .sheet-actions { display: flex; gap: 10px; }
  .btn { flex: 1; font-family: var(--font); font-size: 15px; font-weight: 800; border: none; border-radius: 15px; padding: 15px; cursor: pointer; transition: transform .12s ease, filter .2s ease; }
  .btn:active { transform: translateY(1px) scale(.99); }
  .btn:focus-visible { outline: 2.5px solid var(--accent); outline-offset: 2px; }
  .btn-primary { color: #fff; background: linear-gradient(150deg, var(--accent-2), var(--accent)); box-shadow: 0 12px 24px -12px var(--accent); }
  .btn-ghost { background: var(--app-2); color: var(--ink); border: 1px solid var(--line); }

  .confetti { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 25; }
  .confetti i { position: absolute; top: -14px; width: 9px; height: 13px; border-radius: 2px; opacity: 0; animation: fall var(--cd,1.5s) cubic-bezier(.3,.6,.5,1) forwards; }
  @keyframes fall { 0%{transform:translateY(-10%) rotate(0);opacity:0} 12%{opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }

  @media (prefers-reduced-motion: reduce) { .confetti{display:none} .frame.done .board{animation:none} .sheet{transition:none} }
</style>

</head>
<body>
<div class="app" id="app">
  <div class="appbar">
    <div class="brand"><span class="logo">🧩</span> Puzzle Pop</div>
    <span class="pill" id="progress">0 / 9</span>
  </div>

  <div class="modes" id="modes">
    <button class="seg on" data-n="3">🐶 Easy · 9</button>
    <button class="seg" data-n="4">🦄 Medium · 16</button>
    <button class="seg" data-n="5">🧩 Hard · 25</button>
  </div>

  <div class="stage">
    <div class="frame" id="frame">
      <div class="ghost" id="ghost"></div>
      <div class="slots" id="slots"></div>
      <div class="board" id="board"></div>
    </div>
    <p class="status" id="hint">Drag the picture into place</p>
    <div class="preview"><div class="thumb" id="thumb"></div></div>
  </div>

  <div class="toolbar">
    <button class="tool" id="peek" aria-pressed="false"><span class="ic">👁</span>Picture</button>
    <button class="tool" id="hintbtn"><span class="ic">💡</span>Hint</button>
    <button class="tool" id="shuffle"><span class="ic">🔀</span>Shuffle</button>
    <label class="tool primary"><span class="ic">📷</span>Photo<input type="file" id="file" accept="image/*" /></label>
  </div>

  <div class="confetti" id="confetti"></div>

  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <h2>You made it! 🎉</h2>
    <p id="sheetSub">Your memory, brought back to life.</p>
    <div class="sheet-actions">
      <button class="btn btn-primary" id="newBtn">New puzzle</button>
    </div>
  </div>
</div>

  const MODE_IMG={3:dog(),4:unicorn(),5:HARD_IMG};

  let N=3, COUNT=9, currentImg=MODE_IMG[3], size=0, cell=0, ps=0, gap=10;
  let slotToPiece=[];
  const rand=(a,b)=>Math.random()*(b-a)+a;
  function home(s){const c=s%N,r=(s/N)|0;return{x:c*cell+gap/2,y:r*cell+gap/2};}
  function slotCenter(s){const c=s%N,r=(s/N)|0;return{x:(c+.5)*cell,y:(r+.5)*cell};}
  function nearestSlot(px,py){let b=0,bd=Infinity;for(let i=0;i<COUNT;i++){const s=slotCenter(i),d=Math.hypot(px-s.x,py-s.y);if(d<bd){bd=d;b=i;}}return b;}
  function place(p,s){p._slot=s;slotToPiece[s]=p;const h=home(s);p.style.transform=`translate(${h.x}px, ${h.y}px)`;}
  function derange(n){let a;do{a=[...Array(n).keys()].sort(()=>Math.random()-.5);}while(a.some((v,i)=>v===i));return a;}

  function build(){
    size=frame.clientWidth; if(!size){requestAnimationFrame(build);return;}
    COUNT=N*N; cell=size/N; gap=Math.max(4,Math.round(cell*0.09)); ps=cell-gap;
    const step=100/(N-1), bgSize=(N*100)+'%';
    slotsEl.style.gridTemplateColumns=`repeat(${N},1fr)`; slotsEl.style.gridTemplateRows=`repeat(${N},1fr)`;
    slotsEl.innerHTML=''; board.innerHTML=''; confetti.innerHTML=''; frame.classList.remove('done'); app.classList.remove('solved');
    slotToPiece=new Array(COUNT).fill(null);
    for(let i=0;i<COUNT;i++){const s=document.createElement('div');s.className='slot';s.style.margin=(gap/2)+'px';slotsEl.appendChild(s);}
    const start=derange(COUNT);
    for(let i=0;i<COUNT;i++){const col=i%N,row=(i/N)|0,p=document.createElement('div');p.className='piece';
      p.style.width=p.style.height=ps+'px'; p.style.backgroundImage=`url("${currentImg}")`; p.style.backgroundSize=bgSize+' '+bgSize;
      p.style.backgroundPosition=`${col*step}% ${row*step}%`;
      p._correct=i; attachDrag(p); board.appendChild(p); place(p,start[i]);}
    ghost.style.backgroundImage=`url("${currentImg}")`; thumb.style.backgroundImage=`url("${currentImg}")`; refresh(); hint.textContent='Drag the picture into place';
  }
  function refresh(){let ok=0;for(const p of board.children){const c=p._slot===p._correct;p.classList.toggle('correct',c);if(c)ok++;}
    progress.textContent=ok+' / '+COUNT; progress.classList.toggle('complete',ok===COUNT); return ok;}
  function attachDrag(p){let dg=false,ox=0,oy=0,dx=0,dy=0,hx=0,hy=0;
    p.addEventListener('pointerdown',e=>{if(frame.classList.contains('done'))return;dg=true;p.setPointerCapture(e.pointerId);p.classList.add('dragging');
      ox=e.clientX;oy=e.clientY;dx=0;dy=0;const h=home(p._slot);hx=h.x;hy=h.y;p.style.transform=`translate(${hx}px, ${hy}px) scale(1.07)`;e.preventDefault();});
    p.addEventListener('pointermove',e=>{if(!dg)return;dx=e.clientX-ox;dy=e.clientY-oy;p.style.transform=`translate(${hx+dx}px, ${hy+dy}px) scale(1.07)`;});
    const end=()=>{if(!dg)return;dg=false;p.classList.remove('dragging');const cx=hx+dx+ps/2,cy=hy+dy+ps/2,t=nearestSlot(cx,cy),from=p._slot;
      if(t!==from){const occ=slotToPiece[t];if(occ&&occ!==p)place(occ,from);place(p,t);}else{place(p,from);}
      const ok=refresh();if(ok===COUNT){hint.textContent='Perfect.';setTimeout(finish,280);}else{hint.textContent='Nice — keep going';}};
    p.addEventListener('pointerup',end);p.addEventListener('pointercancel',end);}
  function showHint(){if(frame.classList.contains('done'))return;const w=[...board.children].find(p=>p._slot!==p._correct);if(!w)return;
    const slot=slotsEl.children[w._correct];w.classList.add('hinting');slot.classList.add('hinting');hint.textContent='That piece goes in the glowing spot';
    setTimeout(()=>{w.classList.remove('hinting');slot.classList.remove('hinting');},1500);}
  function finish(){frame.classList.add('done');app.classList.add('solved');burst();hint.textContent='';}
  function burst(){confetti.innerHTML='';for(let i=0;i<34;i++){const b=document.createElement('i');b.style.left=rand(2,98)+'%';b.style.background=COLORS[i%COLORS.length];
    b.style.setProperty('--cd',rand(1.2,2)+'s');b.style.animationDelay=rand(0,.3)+'s';b.style.transform=`rotate(${rand(0,360)}deg)`;confetti.appendChild(b);}
    setTimeout(()=>{confetti.innerHTML='';},2500);}

  modes.addEventListener('click',e=>{const b=e.target.closest('.seg');if(!b)return;
    [...modes.children].forEach(s=>s.classList.remove('on'));b.classList.add('on');N=+b.dataset.n;currentImg=MODE_IMG[N];build();});
  shuffleBtn.addEventListener('click',build);
  newBtn.addEventListener('click',build);
  hintBtn.addEventListener('click',showHint);
  peekBtn.addEventListener('click',()=>{const on=ghost.classList.toggle('show');peekBtn.setAttribute('aria-pressed',String(on));});
  fileInput.addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{currentImg=r.result;sheetSub.textContent='Your memory, brought back to life.';build();};r.readAsDataURL(f);});
  let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(build,200);});
  build();
  if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});});}
  if(window.caches){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}
</script>
